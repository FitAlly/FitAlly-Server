spring:
  application:
    name: backend
  # 🚀 이 두 줄을 새로 추가해 주세요! (Flyway 끄기)
  flyway:
    enabled: false

  datasource:
    # 방금 만드신 fitally_db로 주소를 맞췄습니다!
    url: jdbc:postgresql://localhost:5432/fitally_db
    username: postgres # (본인의 PostgreSQL 아이디, 보통 postgres)
    password: 9998 # (본인의 PostgreSQL 진짜 비밀번호로 꼭 바꿔주세요!)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 서버 켤 때마다 엔티티(Exercise.java)를 보고 테이블을 자동으로 만들어줌
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true # SQL을 예쁘게 줄바꿈해서 보여줌
    show-sql: true # 하이버네이트가 DB에 날리는 쿼리를 콘솔에 보여줌

gemini:
  api-key: ${GEMINI_API_KEY}

openai:
  api-key: ${OPENAI_API_KEY}